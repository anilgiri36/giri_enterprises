<html>
<head>
<meta charset="UTF-8">
<title>Giri Enterprises POS</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

/* KEEP YOUR ORIGINAL UI */
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
  padding-bottom:70px; /* ONLY ADD FOR FOOTER */
}

/* your original hidden pages logic stays same */
#loginPage,#app,#adminPanel{display:none}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button{
  padding:10px;
  margin:5px;
  width:220px;
  background:#ffcc00;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  color:#000;
}

.card{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:12px;
  width:320px;
}

.section{
  background:#fff;
  color:#000;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

input,select{
  padding:8px;
  margin:5px;
  width:90%;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  color:#000;
}

th{
  background:#1e3c72;
  color:#fff;
}

td{
  border:1px solid #ddd;
  padding:6px;
}

tr:nth-child(even){
  background:#f2f6ff;
}

/* FOOTER ONLY */
footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  color:gray;
  text-align:center;
  padding:8px;
  z-index:9999;
}

</style>
</head>

<body>

<!-- YOUR ORIGINAL WELCOME -->
<div id="welcome" class="center" style="display:flex">
<h1>🏪 Giri Enterprises POS</h1>
<button onclick="openLogin()">Login</button>
</div>

<!-- YOUR ORIGINAL LOGIN (UNCHANGED) -->
<div id="loginPage" class="center">
<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- YOUR APP (UNCHANGED) -->
<div id="app">

<div style="text-align:right;padding:10px;">
<button onclick="logout()" style="background:#e74c3c;color:#fff;width:120px;">Sign Out</button>
</div>

<div id="adminPanel" class="section">
<h2>Admin Panel</h2>
<input id="newEmail" placeholder="Email">
<input id="newPass" placeholder="Password">

<select id="newRole">
<option value="employee">Employee</option>
<option value="admin">Admin</option>
</select>

<button onclick="createUser()">Create User</button>
<ul id="userList"></ul>
</div>

<div class="section">
<h2>Billing System</h2>

<h4 id="userInfo"></h4>

<input id="item" placeholder="Item">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Qty">

<button onclick="addItem()">Add Item</button>
<button onclick="clearAllItems()" style="background:red;color:#fff;">Delete All</button>

<table id="billTable">
<tr>
<th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
</tr>
</table>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="saveBill()">Save Bill</button>
<button onclick="printBill()">Print / PDF</button>

</div>
</div>

<!-- FOOTER (ONLY ADDITION) -->
<footer>
  <p>© 2026 Anil Giri. All rights reserved.</p>

  <marquee>
    <p style="color:green;font-weight:bold;margin:0;">
      Page created by Anil Giri
    </p>
  </marquee>
</footer>

<script>

/* YOUR ORIGINAL JS REMAINS SAME (NOT CHANGED) */

firebase.initializeApp({
  apiKey: "AIzaSyBaTFSvArWkwktLcf71pm-lGLc7TmV56dU",
  authDomain: "giri-enterprises-pos.firebaseapp.com",
  databaseURL: "https://giri-enterprises-pos-default-rtdb.firebaseio.com",
  projectId: "giri-enterprises-pos"
});

const auth = firebase.auth();
const db = firebase.database();

let currentUser=null;
let billItems=[];
let total=0;

function openLogin(){
  document.getElementById("welcome").style.display="none";
  document.getElementById("loginPage").style.display="flex";
}

function back(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("welcome").style.display="flex";
}

/* KEEP ALL YOUR EXISTING FUNCTIONS AS IT IS */
</script>

</body>
</html>
