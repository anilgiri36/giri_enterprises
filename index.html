<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Giri Enterprises POS</title>

<!-- Firebase (COMPAT VERSION - IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#2c3e50;color:white}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button{
  padding:12px;
  margin:10px;
  width:200px;
  cursor:pointer;
}
.card{
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
}
#app{display:none;color:black;background:#f2f2f2;height:100vh;padding:10px}
</style>
</head>

<body>

<div id="welcome" class="center">
<h1>Giri Enterprises</h1>
<button onclick="openLogin('admin')">Admin Login</button>
<button onclick="openLogin('employee')">Employee Login</button>
</div>

<div id="login" class="center" style="display:none">
<div class="card">
<h3 id="title"></h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<button onclick="back()">Back</button>
</div>
</div>

<div id="app">
<h2>Dashboard</h2>
<h3 id="roleText"></h3>
</div>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBaTFSvArWkwktLcf71pm-lGLc7TmV56dU",
  authDomain: "giri-enterprises-pos.firebaseapp.com",
  databaseURL: "https://giri-enterprises-pos-default-rtdb.firebaseio.com",
  projectId: "giri-enterprises-pos",
  storageBucket: "giri-enterprises-pos.firebasestorage.app",
  messagingSenderId: "287416000311",
  appId: "1:287416000311:web:353a28d193e6739aa384b2",
  measurementId: "G-NX7N5JDKP6"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let selectedRole = "";

/* OPEN LOGIN */
function openLogin(role){
  selectedRole = role;
  welcome.style.display="none";
  login.style.display="flex";
  title.innerText = role.toUpperCase()+" LOGIN";
}

/* BACK */
function back(){
  login.style.display="none";
  welcome.style.display="flex";
}

/* LOGIN */
async function login(){
  try{
    let res = await auth.signInWithEmailAndPassword(email.value, pass.value);
    
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    
    document.getElementById("roleText").innerText =
      "Logged in as: " + selectedRole;

  }catch(e){
    alert(e.message);
  }
}
</script>

</body>
</html>
