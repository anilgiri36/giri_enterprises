<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Giri Enterprises POS</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#2c3e50;color:white}
.center{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column}
button{padding:10px;margin:8px;width:200px;border:none;border-radius:5px;cursor:pointer;background:#2980b9;color:white}
.card{background:white;color:black;padding:20px;border-radius:10px}
#app{display:none;background:#ecf0f1;color:black;padding:10px}
.section{background:white;margin:10px;padding:15px;border-radius:10px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ccc;padding:6px;text-align:center}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="center">
<h1>Giri Enterprises POS</h1>
<button onclick="openLogin('admin')">Admin Login</button>
<button onclick="openLogin('employee')">Employee Login</button>
</div>

<!-- LOGIN -->
<div id="login" class="center" style="display:none">
<div class="card">
<h3 id="title"></h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- APP -->
<div id="app">

<!-- ADMIN PANEL -->
<div id="adminPanel" class="section">
<h2>Admin Panel</h2>

<input id="newEmail" placeholder="New User Email">
<input id="newPass" placeholder="Password">

<select id="role">
<option value="employee">Employee</option>
<option value="admin">Admin</option>
</select>

<button onclick="createUser()">Create User</button>

<h3>Users</h3>
<ul id="userList"></ul>
</div>

<!-- BILLING -->
<div class="section">
<h2>Billing</h2>

<input id="item" placeholder="Item">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Qty">

<button onclick="addItem()">Add Item</button>

<table id="billTable">
<tr>
<th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Edit</th>
</tr>
</table>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="saveBill()">Save Bill</button>
</div>

</div>

<script>

/* FIREBASE CONFIG */
firebase.initializeApp({
  apiKey: "AIzaSyBaTFSvArWkwktLcf71pm-lGLc7TmV56dU",
  authDomain: "giri-enterprises-pos.firebaseapp.com",
  projectId: "giri-enterprises-pos"
});

const auth = firebase.auth();
const db = firebase.firestore();

let selectedRole = "";
let total = 0;

/* NAVIGATION */
function openLogin(role){
  selectedRole = role;
  welcome.style.display="none";
  login.style.display="flex";
  title.innerText = role.toUpperCase()+" LOGIN";
}

function back(){
  login.style.display="none";
  welcome.style.display="flex";
}

/* LOGIN */
async function login(){
  try{
    let res = await auth.signInWithEmailAndPassword(email.value, pass.value);
    let uid = res.user.uid;

    let doc = await db.collection("users").doc(uid).get();

    if(!doc.exists){
      alert("User not found in DB");
      return;
    }

    let role = doc.data().role;

    if(role !== selectedRole){
      alert("Wrong role selected");
      return;
    }

    login.style.display="none";
    app.style.display="block";

    if(role === "admin"){
      adminPanel.style.display="block";
      loadUsers();
    } else {
      adminPanel.style.display="none";
    }

  }catch(e){
    alert(e.message);
  }
}

/* CREATE USER (MAX 20 EMPLOYEES) */
async function createUser(){

  let snap = await db.collection("users").get();
  let emp = 0;

  snap.forEach(d=>{
    if(d.data().role === "employee") emp++;
  });

  if(role.value === "employee" && emp >= 20){
    alert("Max 20 employees allowed");
    return;
  }

  let u = await auth.createUserWithEmailAndPassword(newEmail.value, newPass.value);

  await db.collection("users").doc(u.user.uid).set({
    email:newEmail.value,
    role:role.value
  });

  alert("User Created ✔");
  loadUsers();
}

/* LOAD USERS */
async function loadUsers(){
  let snap = await db.collection("users").get();
  userList.innerHTML="";
  snap.forEach(d=>{
    userList.innerHTML += `<li>${d.data().email} (${d.data().role})</li>`;
  });
}

/* BILLING */
function addItem(){

  let item = itemEl.value;
  let price = Number(priceEl.value);
  let qty = Number(qtyEl.value);

  let t = price * qty;

  let row = billTable.insertRow();
  row.innerHTML = `
    <td>${item}</td>
    <td>${price}</td>
    <td>${qty}</td>
    <td>${t}</td>
    <td><button onclick="editRow(this)">Edit</button></td>
  `;

  total += t;
  totalEl.innerText = total;
}

/* EDIT ROW */
function editRow(btn){
  let row = btn.parentNode.parentNode;

  let item = prompt("Item", row.cells[0].innerText);
  let price = prompt("Price", row.cells[1].innerText);
  let qty = prompt("Qty", row.cells[2].innerText);

  if(item){
    row.cells[0].innerText = item;
    row.cells[1].innerText = price;
    row.cells[2].innerText = qty;
    row.cells[3].innerText = price * qty;

    recalc();
  }
}

/* RECALC */
function recalc(){
  total = 0;
  document.querySelectorAll("#billTable tr").forEach((r,i)=>{
    if(i===0) return;
    total += Number(r.cells[3].innerText);
  });
  totalEl.innerText = total;
}

/* SAVE BILL */
async function saveBill(){

  let items = [];

  document.querySelectorAll("#billTable tr").forEach((r,i)=>{
    if(i===0) return;
    items.push({
      item:r.cells[0].innerText,
      price:r.cells[1].innerText,
      qty:r.cells[2].innerText,
      total:r.cells[3].innerText
    });
  });

  await db.collection("bills").add({
    items:items,
    total:total,
    time:new Date().toISOString()
  });

  alert("Bill Saved ✔");
}

</script>

</body>
</html>
