<html>
<head>
<meta charset="UTF-8">
<title>Giri Enterprises POS</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
  padding-bottom:80px; /* IMPORTANT for footer space */
}

#loginPage,#app,#adminPanel{display:none}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button{
  padding:10px;
  margin:5px;
  width:220px;
  background:#ffcc00;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  color:#000;
}

.card{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:12px;
  width:320px;
}

.section{
  background:#fff;
  color:#000;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

input,select{
  padding:8px;
  margin:5px;
  width:90%;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  color:#000;
}

th{
  background:#1e3c72;
  color:#fff;
}

td{
  border:1px solid #ddd;
  padding:6px;
}

tr:nth-child(even){
  background:#f2f6ff;
}

/* FIXED FOOTER */
footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  color:gray;
  text-align:center;
  padding:8px;
  z-index:9999;
}

</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="center" style="display:flex">
<h1>🏪 Giri Enterprises POS</h1>
<button onclick="openLogin()">Login</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="center">
<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div style="text-align:right;padding:10px;">
<button onclick="logout()" style="background:#e74c3c;color:#fff;width:120px;">Sign Out</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="section">
<h2>Admin Panel</h2>

<input id="newEmail" placeholder="Email">
<input id="newPass" placeholder="Password">

<select id="newRole">
<option value="employee">Employee</option>
<option value="admin">Admin</option>
</select>

<button onclick="createUser()">Create User</button>

<h4>User List</h4>
<ul id="userList"></ul>
</div>

<!-- BILLING -->
<div class="section">

<h2>Billing System</h2>

<h4 id="userInfo"></h4>

<input id="item" placeholder="Item">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Qty">

<button onclick="addItem()">Add Item</button>
<button onclick="clearAllItems()" style="background:red;color:#fff;">Delete All</button>

<table id="billTable">
<tr>
<th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
</tr>
</table>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="saveBill()">Save Bill</button>
<button onclick="printBill()">Print / PDF</button>

</div>
</div>

<!-- FOOTER (ALWAYS VISIBLE) -->
<footer>
  <p>© 2026 Anil Giri. All rights reserved.</p>
  <marquee>
    <p style="color:green; font-weight:bold; margin:0;">
      Page created by Anil Giri
    </p>
  </marquee>
</footer>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyBaTFSvArWkwktLcf71pm-lGLc7TmV56dU",
  authDomain: "giri-enterprises-pos.firebaseapp.com",
  databaseURL: "https://giri-enterprises-pos-default-rtdb.firebaseio.com",
  projectId: "giri-enterprises-pos"
});

const auth = firebase.auth();
const db = firebase.database();

let currentUser=null;
let billItems=[];
let total=0;

/* NAV */
function openLogin(){
  document.getElementById("welcome").style.display="none";
  document.getElementById("loginPage").style.display="flex";
}

function back(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("welcome").style.display="flex";
}

/* LOGIN */
function login(){

  auth.signInWithEmailAndPassword(email.value, pass.value)
  .then(res=>{

    db.ref("users/"+res.user.uid).once("value").then(snap=>{

      currentUser=snap.val();

      document.getElementById("loginPage").style.display="none";
      document.getElementById("app").style.display="block";

      document.getElementById("userInfo").innerText=
      `Logged in as: ${currentUser.email} (${currentUser.role})`;

      if(currentUser.role==="admin"){
        document.getElementById("adminPanel").style.display="block";
        loadUsers();
      }

    });

  })
  .catch(e=>alert(e.message));
}

/* LOGOUT */
function logout(){
  auth.signOut().then(()=>{

    currentUser=null;
    billItems=[];
    total=0;

    document.getElementById("app").style.display="none";
    document.getElementById("adminPanel").style.display="none";
    document.getElementById("welcome").style.display="flex";

  });
}

/* ADD ITEM */
function addItem(){

  let i=document.getElementById("item");
  let p=document.getElementById("price");
  let q=document.getElementById("qty");

  if(i.value.trim()==="" || p.value==="" || q.value===""){
    alert("Fill all fields");
    return;
  }

  let t=Number(p.value)*Number(q.value);

  billItems.push({
    item:i.value,
    price:Number(p.value),
    qty:Number(q.value),
    total:t
  });

  i.value="";p.value="";q.value="";
  render();
}

/* RENDER */
function render(){

  let table=document.getElementById("billTable");

  table.innerHTML=`
  <tr>
    <th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
  </tr>`;

  total=0;

  billItems.forEach((x,i)=>{
    total+=x.total;

    table.innerHTML+=`
      <tr>
        <td>${x.item}</td>
        <td>${x.price}</td>
        <td>${x.qty}</td>
        <td>${x.total}</td>
        <td>
          <button onclick="editItem(${i})">Edit</button>
          <button onclick="deleteItem(${i})">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("total").innerText=total;
}

/* EDIT */
function editItem(i){
  let x=billItems[i];

  let item=prompt("Item",x.item);
  let price=prompt("Price",x.price);
  let qty=prompt("Qty",x.qty);

  if(!item||!price||!qty) return;

  billItems[i]={
    item,
    price:Number(price),
    qty:Number(qty),
    total:Number(price)*Number(qty)
  };

  render();
}

/* DELETE */
function deleteItem(i){
  billItems.splice(i,1);
  render();
}

/* CLEAR ALL */
function clearAllItems(){
  billItems=[];
  render();
}

/* PRINT */
function printBill(){

  let now=new Date();

  let rows="";

  billItems.forEach(x=>{
    rows+=`
      <tr>
        <td>${x.item}</td>
        <td>${x.price}</td>
        <td>${x.qty}</td>
        <td>${x.total}</td>
      </tr>
    `;
  });

  let w=window.open("");

  w.document.write(`
  <html>
  <body>
  <h2 style="text-align:center">GIRI ENTERPRISES</h2>

  <h4 style="text-align:center">
  Address: Taluka-Latur, Dist-Latur - 413 512, Maharashtra, India
  </h4>

  <p style="text-align:center">
  ${now.toLocaleDateString()} | ${now.toLocaleTimeString()}
  </p>

  <table border="1" width="100%">
  <tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr>
  ${rows}
  </table>

  <h3 style="text-align:center">Total: ₹${total}</h3>

  </body>
  </html>
  `);

  w.print();
}

</script>

</body>
</html>
