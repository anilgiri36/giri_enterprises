<html>
<head>
<meta charset="UTF-8">
<title>Giri Enterprises POS</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
}

.page{display:none}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button{
  padding:10px;
  margin:5px;
  width:220px;
  background:#ffcc00;
  color:#000;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:12px;
  width:320px;
}

.section{
  background:#fff;
  color:#000;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

input,select{
  padding:8px;
  margin:5px;
  width:90%;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  color:#000;
}

th{
  background:#1e3c72;
  color:#fff;
}

td{
  border:1px solid #ddd;
  padding:6px;
}

tr:nth-child(even){
  background:#f2f6ff;
}

</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="page center" style="display:flex">
<h1>🏪 Giri Enterprises POS</h1>
<button onclick="openLogin('admin')">Admin Login</button>
<button onclick="openLogin('employee')">Employee Login</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="page center">
<div class="card">
<h2 id="title"></h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- APP -->
<div id="app" class="page">

<!-- ADMIN -->
<div id="adminPanel" class="section" style="display:none">
<h2>Admin Panel</h2>

<input id="newEmail" placeholder="Email">
<input id="newPass" placeholder="Password">

<select id="newRole">
<option value="employee">Employee</option>
<option value="admin">Admin</option>
</select>

<button onclick="createUser()">Create User</button>

<h4>User List</h4>
<ul id="userList"></ul>
</div>

<!-- BILLING -->
<div class="section">

<h2>Billing System</h2>

<h4 id="userInfo"></h4>

<input id="item" placeholder="Item">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Qty">

<button onclick="addItem()">Add Item</button>
<button onclick="clearAllItems()" style="background:#e74c3c;color:#fff;">Delete All</button>

<table id="billTable">
<tr>
<th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
</tr>
</table>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="saveBill()">Save Bill</button>
<button onclick="printBill()">Print / PDF</button>

</div>
</div>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyBaTFSvArWkwktLcf71pm-lGLc7TmV56dU",
  authDomain: "giri-enterprises-pos.firebaseapp.com",
  databaseURL: "https://giri-enterprises-pos-default-rtdb.firebaseio.com",
  projectId: "giri-enterprises-pos"
});

const auth = firebase.auth();
const db = firebase.database();

let currentUser=null;
let billItems=[];
let total=0;

/* NAV */
function openLogin(role){
  document.getElementById("welcome").style.display="none";
  document.getElementById("loginPage").style.display="flex";
  document.getElementById("title").innerText=role.toUpperCase()+" LOGIN";
}

function back(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("welcome").style.display="flex";
}

/* LOGIN */
function login(){

  auth.signInWithEmailAndPassword(email.value, pass.value)
  .then(res=>{

    db.ref("users/"+res.user.uid).once("value").then(snap=>{

      currentUser=snap.val();

      document.getElementById("loginPage").style.display="none";
      document.getElementById("app").style.display="block";

      document.getElementById("userInfo").innerText=
      `Logged in as: ${currentUser.email} (${currentUser.role})`;

      if(currentUser.role==="admin"){
        document.getElementById("adminPanel").style.display="block";
        loadUsers();
      }

    });

  })
  .catch(e=>alert(e.message));
}

/* CREATE USER */
function createUser(){

  auth.createUserWithEmailAndPassword(newEmail.value,newPass.value)
  .then(res=>{

    db.ref("users/"+res.user.uid).set({
      email:newEmail.value,
      role:newRole.value
    });

    alert("User Created ✔");
    loadUsers();

  });
}

/* USERS */
function loadUsers(){
  db.ref("users").once("value",snap=>{
    let list=document.getElementById("userList");
    list.innerHTML="";
    snap.forEach(s=>{
      list.innerHTML+=`<li>${s.val().email} (${s.val().role})</li>`;
    });
  });
}

/* ADD ITEM - FIXED */
function addItem(){

  let i=document.getElementById("item");
  let p=document.getElementById("price");
  let q=document.getElementById("qty");

  let item=i.value.trim();
  let price=Number(p.value);
  let qty=Number(q.value);

  if(item==="" || isNaN(price) || isNaN(qty) || price<=0 || qty<=0){
    alert("Enter valid item, price and qty");
    return;
  }

  let t=price*qty;

  billItems.push({
    item,
    price,
    qty,
    total:t
  });

  i.value=""; p.value=""; q.value="";
  i.focus();

  render();
}

/* RENDER */
function render(){

  let table=document.getElementById("billTable");

  table.innerHTML=`
  <tr>
    <th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
  </tr>`;

  total=0;

  billItems.forEach((x,i)=>{
    total+=x.total;

    table.innerHTML+=`
      <tr>
        <td>${x.item}</td>
        <td>${x.price}</td>
        <td>${x.qty}</td>
        <td>${x.total}</td>
        <td>
          <button onclick="editItem(${i})">Edit</button>
          <button onclick="deleteItem(${i})">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("total").innerText=total;
}

/* EDIT FIXED */
function editItem(i){

  let x=billItems[i];

  let item=prompt("Item",x.item);
  let price=prompt("Price",x.price);
  let qty=prompt("Qty",x.qty);

  if(!item || !price || !qty) return;

  price=Number(price);
  qty=Number(qty);

  if(item.trim()==="" || isNaN(price) || isNaN(qty)) return;

  billItems[i]={
    item:item.trim(),
    price,
    qty,
    total:price*qty
  };

  render();
}

/* DELETE */
function deleteItem(i){
  billItems.splice(i,1);
  render();
}

/* CLEAR ALL */
function clearAllItems(){
  billItems=[];
  render();
}

/* PRINT */
function printBill(){

  let now=new Date();

  let rows="";

  billItems.forEach(x=>{
    rows+=`
      <tr>
        <td>${x.item}</td>
        <td>${x.price}</td>
        <td>${x.qty}</td>
        <td>${x.total}</td>
      </tr>
    `;
  });

  let w=window.open("");

  w.document.write(`
  <html>
  <body>
  <h2 style="text-align:center">GIRI ENTERPRISES</h2>

  <h4 style="text-align:center">
  Address: Taluka-Latur, Dist-Latur - 413 512, Maharashtra, India
  </h4>

  <p style="text-align:center">
  ${now.toLocaleDateString()} | ${now.toLocaleTimeString()} | ${now.toLocaleDateString('en-US',{weekday:'long'})}
  </p>

  <table border="1" width="100%">
  <tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr>
  ${rows}
  </table>

  <h3 style="text-align:center">Total: ₹${total}</h3>

  <h3 style="text-align:center">Thank you! Visit Again 🙏</h3>

  </body>
  </html>
  `);

  w.print();
}

</script>

</body>
</html>
