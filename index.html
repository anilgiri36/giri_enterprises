<html>
<head>
<meta charset="UTF-8">
<title>Giri Enterprises POS</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
  padding-bottom:90px;
}

#loginPage,#app,#adminPanel{display:none}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button{
  padding:10px;
  margin:5px;
  width:220px;
  background:#ffcc00;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  color:#000;
}

.card{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:12px;
  width:320px;
}

.section{
  background:#fff;
  color:#000;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

input,select{
  padding:8px;
  margin:5px;
  width:90%;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  color:#000;
}

th{
  background:#1e3c72;
  color:#fff;
}

td{
  border:1px solid #ddd;
  padding:6px;
}

tr:nth-child(even){
  background:#f2f6ff;
}

/* CLOCK */
#clockBox{
  background:#111;
  color:#fff;
  padding:10px;
  border-radius:8px;
  text-align:center;
  margin-bottom:10px;
  font-weight:bold;
}

/* FOOTER */
footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  color:gray;
  text-align:center;
  padding:8px;
  z-index:9999;
}

</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="center" style="display:flex">
<h1>🏪 Giri Enterprises POS</h1>
<button onclick="openLogin('admin')">Admin Login</button>
<button onclick="openLogin('employee')">Employee Login</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="center">
<div class="card">
<h2 id="loginTitle">LOGIN</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="back()">Back</button>

</div>
</div>

<!-- APP -->
<div id="app">

<div style="text-align:right;padding:10px;">
<button onclick="logout()" style="background:red;color:#fff;width:120px;">Sign Out</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="section">
<h2>Admin Panel</h2>

<input id="newEmail" placeholder="Email">
<input id="newPass" placeholder="Password">

<select id="newRole">
<option value="employee">Employee</option>
<option value="admin">Admin</option>
</select>

<button onclick="createUser()">Create User</button>

<ul id="userList"></ul>
</div>

<!-- BILLING -->
<div class="section">

<h2>Billing System</h2>

<div id="clockBox"></div>

<h4 id="userInfo"></h4>

<input id="item" placeholder="Item">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Qty">

<button onclick="addItem()">Add Item</button>
<button onclick="clearAllItems()" style="background:red;color:#fff;">Delete All</button>

<table id="billTable"></table>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="printBill()">Print / PDF</button>

</div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Anil Giri. All rights reserved.</p>
</footer>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyBaT...",
  authDomain: "giri-enterprises-pos.firebaseapp.com",
  databaseURL: "https://giri-enterprises-pos-default-rtdb.firebaseio.com",
  projectId: "giri-enterprises-pos"
});

const auth = firebase.auth();
const db = firebase.database();

let currentUser=null;
let billItems=[];

/* CLOCK */
function updateClock(){
  const el=document.getElementById("clockBox");
  if(!el) return;

  const now=new Date();

  const date=now.toLocaleDateString('en-IN',{
    weekday:'long', year:'numeric', month:'long', day:'numeric'
  });

  const time=now.toLocaleTimeString('en-IN');

  el.innerHTML=`📅 ${date} | ⏰ ${time}`;
}

setInterval(updateClock,1000);
window.addEventListener("load",updateClock);

/* NAV */
function openLogin(role){
  document.getElementById("welcome").style.display="none";
  document.getElementById("loginPage").style.display="flex";
  document.getElementById("loginTitle").innerText=role.toUpperCase()+" LOGIN";
}

function back(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("welcome").style.display="flex";
}

/* LOGIN */
function login(){
  let email=document.getElementById("email").value.trim();
  let pass=document.getElementById("pass").value.trim();

  auth.signInWithEmailAndPassword(email,pass)
  .then(res=>{
    db.ref("users/"+res.user.uid).once("value").then(snap=>{
      currentUser=snap.val();

      document.getElementById("loginPage").style.display="none";
      document.getElementById("app").style.display="block";

      document.getElementById("userInfo").innerText=
      `User: ${currentUser.email} (${currentUser.role})`;

      if(currentUser.role==="admin"){
        document.getElementById("adminPanel").style.display="block";
      }
    });
  })
  .catch(e=>alert(e.message));
}

/* LOGOUT */
function logout(){
  auth.signOut().then(()=>location.reload());
}

/* ADD ITEM */
function addItem(){

  let item=document.getElementById("item").value.trim();
  let price=Number(document.getElementById("price").value);
  let qty=Number(document.getElementById("qty").value);

  if(!item || price<=0 || qty<=0 || isNaN(price) || isNaN(qty)){
    alert("Enter valid data");
    return;
  }

  billItems.push({
    item, price, qty, total:price*qty
  });

  document.getElementById("item").value="";
  document.getElementById("price").value="";
  document.getElementById("qty").value="";

  render();
}

/* RENDER (FIXED BUTTONS) */
function render(){

  let table=document.getElementById("billTable");

  let html=`
  <tr>
    <th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
  </tr>`;

  let total=0;

  billItems.forEach((x,i)=>{
    total+=x.total;

    html+=`
    <tr>
      <td>${x.item}</td>
      <td>${x.price}</td>
      <td>${x.qty}</td>
      <td>${x.total}</td>
      <td>
        <button onclick="editItem(${i})">Edit</button>
        <button onclick="deleteItem(${i})">Delete</button>
      </td>
    </tr>`;
  });

  table.innerHTML=html;
  document.getElementById("total").innerText=total;
}

/* EDIT */
function editItem(i){
  let x=billItems[i];

  let item=prompt("Item",x.item);
  let price=Number(prompt("Price",x.price));
  let qty=Number(prompt("Qty",x.qty));

  if(!item || isNaN(price) || isNaN(qty)) return;

  billItems[i]={item,price,qty,total:price*qty};
  render();
}

/* DELETE */
function deleteItem(i){
  if(confirm("Delete item?")){
    billItems.splice(i,1);
    render();
  }
}

/* CLEAR ALL */
function clearAllItems(){
  if(confirm("Delete all items?")){
    billItems=[];
    render();
  }
}

/* PRINT */
function printBill(){

  if(billItems.length===0){
    alert("No items");
    return;
  }

  let now=new Date();
  let user=currentUser?currentUser.email:"Unknown";

  let rows="";
  let total=0;

  billItems.forEach(x=>{
    total+=x.total;
    rows+=`
      <tr>
        <td>${x.item}</td>
        <td>${x.price}</td>
        <td>${x.qty}</td>
        <td>${x.total}</td>
      </tr>`;
  });

  let w=window.open("");

  w.document.write(`
  <html>
  <body>
  <h2 style="text-align:center">GIRI ENTERPRISES</h2>

  <p>User: ${user}</p>
  <p>${now.toLocaleString()}</p>

  <table border="1" width="100%">
  <tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr>
  ${rows}
  </table>

  <h3>Total: ₹${total}</h3>

  <script>
    window.print();
  <\/script>

  </body>
  </html>`);

  w.document.close();
}

</script>

</body>
</html>
