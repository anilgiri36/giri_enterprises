<html>
<head>
<meta charset="UTF-8">
<title>Giri Enterprises POS</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
  padding-bottom:80px;
}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#loginPage,#app,#adminPanel{display:none}

button{
  padding:10px;
  margin:5px;
  width:220px;
  background:#ffcc00;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  color:#000;
}

.card{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:10px;
}

.section{
  background:#fff;
  color:#000;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

input,select{
  padding:8px;
  margin:5px;
  width:90%;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  color:#000;
}

th{
  background:#1e3c72;
  color:#fff;
}

td{
  border:1px solid #ddd;
  padding:6px;
}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  color:gray;
  text-align:center;
  padding:8px;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="center">
<h1>Giri Enterprises POS</h1>

<button onclick="openLogin('admin')">Admin Login</button>
<button onclick="openLogin('employee')">Employee Login</button>

</div>

<!-- LOGIN -->
<div id="loginPage" class="center">
<div class="card">

<h2 id="loginTitle">LOGIN</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="back()">Back</button>

</div>
</div>

<!-- APP -->
<div id="app">

<div style="text-align:right;">
<button onclick="logout()" style="background:red;color:#fff;width:120px;">Sign Out</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="section">
<h2>Admin User Management</h2>

<input id="newEmail" placeholder="New User Email">
<input id="newPass" type="password" placeholder="Password">

<select id="newRole">
  <option value="employee">Employee</option>
  <option value="admin">Admin</option>
</select>

<button onclick="createUser()">Add User</button>

<h3>Users List</h3>
<ul id="userList"></ul>

</div>

<!-- BILLING -->
<div class="section">

<h2>Billing System</h2>

<input id="item" placeholder="Item">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Qty">

<button onclick="addItem()">Add Item</button>
<button onclick="clearAllItems()" style="background:red;color:#fff;">Delete All</button>
<button onclick="printBill()">Print Bill</button>

<table id="billTable"></table>

<h3>Total: ₹<span id="total">0</span></h3>

</div>
</div>

<!-- FOOTER -->
<footer>
© 2026 Anil Giri. All rights reserved.
</footer>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyBaTFSvArWkwktLcf71pm-lGLc7TmV56dU",
  authDomain: "giri-enterprises-pos.firebaseapp.com",
  databaseURL: "https://giri-enterprises-pos-default-rtdb.firebaseio.com",
  projectId: "giri-enterprises-pos",
  storageBucket: "giri-enterprises-pos.appspot.com"
});

const auth = firebase.auth();
const db = firebase.database();

let currentUser=null;
let selectedRole="";
let billItems=[];

/* NAV */
function openLogin(role){
  selectedRole=role;
  document.getElementById("welcome").style.display="none";
  document.getElementById("loginPage").style.display="flex";
  document.getElementById("loginTitle").innerText=role.toUpperCase()+" LOGIN";
}

function back(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("welcome").style.display="flex";
}

/* LOGIN */
function login(){

  let email=document.getElementById("email").value.trim();
  let pass=document.getElementById("pass").value.trim();

  auth.signInWithEmailAndPassword(email,pass)
  .then(res=>{

    db.ref("users/"+res.user.uid).once("value")
    .then(snap=>{

      const data=snap.val();

      if(selectedRole!==data.role){
        alert("Access denied");
        auth.signOut();
        return;
      }

      currentUser=data;

      document.getElementById("loginPage").style.display="none";
      document.getElementById("app").style.display="block";

      if(data.role==="admin"){
        document.getElementById("adminPanel").style.display="block";
        loadUsers();
      }

    });

  })
  .catch(e=>alert(e.message));
}

/* CREATE USER (ADMIN ONLY) */
function createUser(){

  let email=document.getElementById("newEmail").value;
  let pass=document.getElementById("newPass").value;
  let role=document.getElementById("newRole").value;

  auth.createUserWithEmailAndPassword(email,pass)
  .then(res=>{

    db.ref("users/"+res.user.uid).set({
      email:email,
      role:role
    });

    alert("User created");
    loadUsers();

  })
  .catch(e=>alert(e.message));
}

/* LOAD USERS */
function loadUsers(){

  db.ref("users").once("value").then(snap=>{

    let html="";

    snap.forEach(child=>{

      let u=child.val();

      html+=`
      <li>
        ${u.email} (${u.role})
        <button onclick="deleteUser('${child.key}')">Delete</button>
      </li>`;
    });

    document.getElementById("userList").innerHTML=html;

  });

}

/* DELETE USER */
function deleteUser(uid){

  if(confirm("Delete user?")){
    db.ref("users/"+uid).remove();
    loadUsers();
  }
}

/* BILLING */
function addItem(){
  let item=document.getElementById("item").value;
  let price=Number(document.getElementById("price").value);
  let qty=Number(document.getElementById("qty").value);

  billItems.push({item,price,qty,total:price*qty});
  render();
}

function render(){

  let total=0;
  let html="<tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr>";

  billItems.forEach(x=>{
    total+=x.total;
    html+=`<tr><td>${x.item}</td><td>${x.price}</td><td>${x.qty}</td><td>${x.total}</td></tr>`;
  });

  document.getElementById("billTable").innerHTML=html;
  document.getElementById("total").innerText=total;
}

/* PRINT */
function printBill(){

  let w=window.open("");

  w.document.write(`
  <h2>Giri Enterprises</h2>
  <p>User: ${currentUser.email}</p>
  <table border="1" width="100%">
  ${document.getElementById("billTable").innerHTML}
  </table>
  <script>window.print()<\/script>
  `);

  w.document.close();
}

</script>

</body>
</html>
