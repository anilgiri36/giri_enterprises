<html>
<head>
<meta charset="UTF-8">
<title>Giri Enterprises POS</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
}

.page{display:none}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button{
  padding:10px;
  margin:5px;
  width:220px;
  background:#ffcc00;
  color:#000;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.card{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:12px;
  width:320px;
}

.section{
  background:#fff;
  color:#000;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

input,select{
  padding:8px;
  margin:5px;
  width:90%;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  color:#000;
}

th{
  background:#1e3c72;
  color:#fff;
}

td{
  border:1px solid #ddd;
  padding:6px;
}

tr:nth-child(even){
  background:#f2f6ff;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="page center" style="display:flex">
<h1>🏪 Giri Enterprises POS</h1>
<button onclick="openLogin('admin')">Admin Login</button>
<button onclick="openLogin('employee')">Employee Login</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="page center">
<div class="card">
<h2 id="title"></h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- APP -->
<div id="app" class="page">

<!-- ADMIN -->
<div id="adminPanel" class="section" style="display:none">
<h2>Admin Panel</h2>

<input id="newEmail" placeholder="Email">
<input id="newPass" placeholder="Password">

<select id="newRole">
<option value="employee">Employee</option>
<option value="admin">Admin</option>
</select>

<button onclick="createUser()">Create User</button>

<h4>User List</h4>
<ul id="userList"></ul>
</div>

<!-- BILLING -->
<div class="section">

<h2>Billing System</h2>

<h4 id="liveTime"></h4>
<h4 id="userInfo"></h4>

<input id="item" placeholder="Item">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Qty">

<button onclick="addItem()">Add Item</button>
<button onclick="clearAllItems()" style="background:#e74c3c;color:#fff;">Delete All Items</button>

<table id="billTable">
<tr>
<th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
</tr>
</table>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="saveBill()">Save Bill</button>
<button onclick="printBill()">Print / PDF</button>

</div>
</div>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyBaTFSvArWkwktLcf71pm-lGLc7TmV56dU",
  authDomain: "giri-enterprises-pos.firebaseapp.com",
  databaseURL: "https://giri-enterprises-pos-default-rtdb.firebaseio.com",
  projectId: "giri-enterprises-pos"
});

const auth = firebase.auth();
const db = firebase.database();

/* STATE */
let currentUser=null;
let billItems=[];
let total=0;
let selectedRole="";

/* EMAIL CHECK */
function isValidEmail(email){
  return email.endsWith("@girienterprises.com");
}

/* NAV */
function openLogin(role){
  selectedRole=role;
  document.getElementById("welcome").style.display="none";
  document.getElementById("loginPage").style.display="flex";
  document.getElementById("title").innerText=role.toUpperCase()+" LOGIN";
}

function back(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("welcome").style.display="flex";
}

/* LOGIN */
function login(){

  auth.signInWithEmailAndPassword(email.value, pass.value)
  .then(res=>{

    if(!isValidEmail(res.user.email)){
      alert("Only @girienterprises.com allowed");
      auth.signOut();
      return;
    }

    db.ref("users/"+res.user.uid).once("value").then(snap=>{

      currentUser=snap.val();

      document.getElementById("loginPage").style.display="none";
      document.getElementById("app").style.display="block";

      document.getElementById("userInfo").innerText=
      `Logged in as: ${currentUser.email} (${currentUser.role})`;

      if(currentUser.role==="admin"){
        document.getElementById("adminPanel").style.display="block";
        loadUsers();
      }

    });

  })
  .catch(e=>alert(e.message));
}

/* CREATE USER */
function createUser(){

  if(!isValidEmail(newEmail.value)){
    alert("Only company email allowed");
    return;
  }

  auth.createUserWithEmailAndPassword(newEmail.value,newPass.value)
  .then(res=>{

    db.ref("users/"+res.user.uid).set({
      email:newEmail.value,
      role:newRole.value
    });

    alert("User Created ✔");
    loadUsers();

  })
  .catch(e=>alert(e.message));
}

/* USERS */
function loadUsers(){
  db.ref("users").once("value",snap=>{
    let list=document.getElementById("userList");
    list.innerHTML="";
    snap.forEach(s=>{
      list.innerHTML+=`<li>${s.val().email} (${s.val().role})</li>`;
    });
  });
}

/* BILL */
function addItem(){

  let item=document.getElementById("item");
  let price=document.getElementById("price");
  let qty=document.getElementById("qty");

  let t=Number(price.value)*Number(qty.value);

  billItems.push({
    item:item.value,
    price:Number(price.value),
    qty:Number(qty.value),
    total:t
  });

  item.value=""; price.value=""; qty.value="";
  item.focus();

  render();
}

/* RENDER */
function render(){

  let table=document.getElementById("billTable");

  table.innerHTML=`
  <tr>
    <th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
  </tr>`;

  total=0;

  billItems.forEach((x,i)=>{
    total+=x.total;

    table.innerHTML+=`
      <tr>
        <td>${x.item}</td>
        <td>${x.price}</td>
        <td>${x.qty}</td>
        <td>${x.total}</td>
        <td>
          <button onclick="editItem(${i})">Edit</button>
          <button onclick="deleteItem(${i})">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("total").innerText=total;
}

/* EDIT */
function editItem(i){

  let x=billItems[i];

  let item=prompt("Item",x.item);
  let price=prompt("Price",x.price);
  let qty=prompt("Qty",x.qty);

  billItems[i]={
    item,
    price:Number(price),
    qty:Number(qty),
    total:Number(price)*Number(qty)
  };

  render();
}

/* DELETE */
function deleteItem(i){
  billItems.splice(i,1);
  render();
}

/* CLEAR ALL */
function clearAllItems(){
  billItems=[];
  render();
}

/* SAVE */
function saveBill(){

  let now=new Date();

  db.ref("bills").push({
    items:billItems,
    total:total,
    date:now.toLocaleDateString(),
    time:now.toLocaleTimeString(),
    createdBy:currentUser
  });

  alert("Bill Saved ✔");
  billItems=[];
  render();
}

/* PRINT */
function printBill(){

  let shop="GIRI ENTERPRISES";
  let addr="Address: Taluka-Latur, Dist-Latur - 413 512, Maharashtra, India";

  let rows="";

  billItems.forEach(x=>{
    rows+=`
      <tr>
        <td>${x.item}</td>
        <td>${x.price}</td>
        <td>${x.qty}</td>
        <td>${x.total}</td>
      </tr>
    `;
  });

  let w=window.open("");

  w.document.write(`
  <html>
  <head>
  <style>
  body{font-family:Arial;padding:20px}
  h2,h4{text-align:center}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid #000;padding:8px;text-align:center}
  th{background:#eee}
  .f{text-align:center;margin-top:20px;font-weight:bold}
  </style>
  </head>
  <body>

  <h2>${shop}</h2>
  <h4>${addr}</h4>

  <table>
  <tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr>
  ${rows}
  </table>

  <h3>Total: ₹${total}</h3>

  <div class="f">
  Thank you for visiting! Visit Again 🙏
  </div>

  </body>
  </html>
  `);

  w.print();
}

</script>

</body>
</html>
