<html>
<head>
<meta charset="UTF-8">
<title>Giri Enterprises POS</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

/* 🌈 BACKGROUND */
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
}

/* PAGE LAYOUT */
.page{
  display:none;
}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* BUTTONS */
button{
  padding:10px;
  margin:5px;
  width:220px;
  background:#ffcc00;
  color:#000;
  border:none;
  cursor:pointer;
  border-radius:6px;
  font-weight:bold;
}

/* LOGIN CARD */
.card{
  background:#ffffff;
  color:#000;
  padding:20px;
  border-radius:12px;
  width:320px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* MAIN SECTION */
.section{
  background:#ffffff;
  color:#000;
  margin:10px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* INPUT */
input,select{
  padding:8px;
  margin:5px;
  width:90%;
  border:1px solid #ccc;
  border-radius:5px;
}

/* TABLE FIX (IMPORTANT) */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  color:#000;
}

th{
  background:#1e3c72;
  color:#fff;
  padding:8px;
}

td{
  padding:8px;
  border:1px solid #ddd;
  color:#000;
}

tr:nth-child(even){
  background:#f2f6ff;
}

/* HEADINGS */
h1,h2,h3,h4{
  color:#000;
}

</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="page center" style="display:flex">
<h1>🏪 Giri Enterprises POS</h1>
<button onclick="openLogin('admin')">Admin Login</button>
<button onclick="openLogin('employee')">Employee Login</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="page center">
<div class="card">
<h2 id="title"></h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- APP -->
<div id="app" class="page">

<!-- ADMIN -->
<div id="adminPanel" class="section" style="display:none">
<h2>👑 Admin Panel</h2>

<input id="newEmail" placeholder="Email">
<input id="newPass" placeholder="Password">

<select id="newRole">
<option value="employee">Employee</option>
<option value="admin">Admin</option>
</select>

<button onclick="createUser()">Create User</button>

<h4>User List</h4>
<ul id="userList"></ul>
</div>

<!-- BILLING -->
<div class="section">

<h2>🛒 Billing System</h2>

<h4 id="liveTime"></h4>
<h4 id="userInfo"></h4>

<input id="item" placeholder="Item">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Qty">

<button onclick="addItem()">Add Item</button>

<table id="billTable">
<tr>
<th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
</tr>
</table>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="saveBill()">Save Bill</button>

</div>
</div>

<script>

/* FIREBASE INIT */
firebase.initializeApp({
  apiKey: "AIzaSyBaTFSvArWkwktLcf71pm-lGLc7TmV56dU",
  authDomain: "giri-enterprises-pos.firebaseapp.com",
  databaseURL: "https://giri-enterprises-pos-default-rtdb.firebaseio.com",
  projectId: "giri-enterprises-pos"
});

const auth = firebase.auth();
const db = firebase.database();

/* STATE */
let selectedRole = "";
let currentUser = null;
let billItems = [];
let total = 0;

/* NAV */
function openLogin(role){
  selectedRole = role;
  document.getElementById("welcome").style.display="none";
  document.getElementById("loginPage").style.display="flex";
  document.getElementById("title").innerText = role.toUpperCase()+" LOGIN";
}

function back(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("welcome").style.display="flex";
}

/* LOGIN */
function login(){

  auth.signInWithEmailAndPassword(email.value, pass.value)
  .then(res=>{

    db.ref("users/" + res.user.uid).once("value").then(snap=>{

      currentUser = snap.val();

      document.getElementById("loginPage").style.display="none";
      document.getElementById("app").style.display="block";

      document.getElementById("userInfo").innerText =
      `Logged in as: ${currentUser.email} (${currentUser.role})`;

      if(currentUser.role === "admin"){
        document.getElementById("adminPanel").style.display="block";
        loadUsers();
      }

    });

  })
  .catch(e=>alert(e.message));
}

/* CREATE USER */
function createUser(){

  auth.createUserWithEmailAndPassword(newEmail.value, newPass.value)
  .then(res=>{

    db.ref("users/" + res.user.uid).set({
      email: newEmail.value,
      role: newRole.value
    });

    alert("User Created ✔");
    loadUsers();

  })
  .catch(e=>alert(e.message));
}

/* LOAD USERS */
function loadUsers(){
  db.ref("users").once("value", snap=>{
    let list = document.getElementById("userList");
    list.innerHTML = "";

    snap.forEach(s=>{
      list.innerHTML += `<li>${s.val().email} (${s.val().role})</li>`;
    });
  });
}

/* TIME */
function getTime(){
  const now = new Date();
  return {
    date: now.toLocaleDateString(),
    time: now.toLocaleTimeString(),
    day: now.toLocaleDateString('en-US',{weekday:'long'})
  };
}

setInterval(()=>{
  let t = getTime();
  document.getElementById("liveTime").innerText =
  `${t.day} | ${t.date} | ${t.time}`;
},1000);

/* BILL */
function addItem(){

  let item = document.getElementById("item").value;
  let price = Number(document.getElementById("price").value);
  let qty = Number(document.getElementById("qty").value);

  let t = price * qty;

  billItems.push({item,price,qty,total:t});

  render();
}

function render(){

  let table = document.getElementById("billTable");

  table.innerHTML = `
  <tr>
    <th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
  </tr>`;

  total = 0;

  billItems.forEach((x,i)=>{
    total += x.total;

    table.innerHTML += `
      <tr>
        <td>${x.item}</td>
        <td>${x.price}</td>
        <td>${x.qty}</td>
        <td>${x.total}</td>
        <td>
          <button onclick="editItem(${i})">Edit</button>
          <button onclick="deleteItem(${i})">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = total;
}

function editItem(i){
  let x = billItems[i];
  let item = prompt("Item",x.item);
  let price = prompt("Price",x.price);
  let qty = prompt("Qty",x.qty);

  billItems[i] = {
    item,
    price:Number(price),
    qty:Number(qty),
    total:Number(price)*Number(qty)
  };

  render();
}

function deleteItem(i){
  billItems.splice(i,1);
  render();
}

/* SAVE BILL */
function saveBill(){

  let t = getTime();

  db.ref("bills").push({
    items: billItems,
    total: total,
    date: t.date,
    time: t.time,
    day: t.day,
    createdBy: currentUser
  });

  alert("Bill Saved ✔");

  billItems = [];
  render();
}

</script>

</body>
</html>
